# ==================== Dev Profile — H2 In-Memory Database ====================
# Overrides MySQL with H2 so the app can start without a cloud DB.
# Run with: mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:qzhipass_dev;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed data for the models table (AIModelProviderService queries it at startup)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-dev.sql