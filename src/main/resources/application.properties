spring.application.name=QZhipass
spring.application.version=1.0.0
server.port=7510

microservice.workerid = 0
microservice.dadacenterid = 0

# Redis Configuration (disabled for local dev)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-idle=8

# MySQL Configuration (use environment variables for production)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/Qzhipass}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================== Spring AI Configuration ====================
# DeepSeek API (OpenAI-compatible) — the only configured provider
spring.ai.openai.api-key=${AI_API_KEY:sk-c79bf1c149de40f5bc50edeca793102d}
spring.ai.openai.base-url=${AI_API_BASE:https://api.deepseek.com/v1}
spring.ai.openai.chat.options.model=${AI_CHAT_MODEL:deepseek-chat}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=4096
# Embedded models (for vector embeddings)
spring.ai.openai.embedding.options.model=${AI_EMBEDDING_MODEL:text-embedding-3-small}
# Ollama (local fallback)
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:qwen3}
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
# Retry & resilience
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2.0
spring.ai.retry.backoff.max-interval=30000
