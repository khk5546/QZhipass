spring.application.name=QZhipass
spring.application.version=1.0.0
server.port=7510

microservice.workerid = 0
microservice.dadacenterid = 0

# Redis Configuration (use environment variables for production)
spring.data.redis.host=192.168.1.7
# ${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.client-type=lettuce
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=1800000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-idle=8

# MySQL Configuration (use environment variables for production)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/Qzhipass}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=YourSecretKeyForJwtTokenGeneration1234567890
jwt.expiration=86400000

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true