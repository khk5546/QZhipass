<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企智通 - 用户测试</title>
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 图标 -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .modal { display: none; background: rgba(0, 0, 0, 0.5); }
    .modal.open { display: flex; }
  </style>
</head>

<body class="bg-gray-50 h-screen flex items-center justify-center">
  
  <!-- 登录界面 -->
  <div id="loginPage" class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-white text-3xl">smart_toy</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">企智通</h1>
      <p class="text-gray-500 mt-2">用户登录</p>
    </div>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
        <input 
          type="tel" 
          id="loginPhone" 
          placeholder="请输入手机号"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">验证码</label>
        <div class="flex gap-2">
          <input 
            type="text" 
            id="loginCode" 
            placeholder="请输入验证码"
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
          <button 
            onclick="sendCode()"
            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all whitespace-nowrap"
          >
            发送验证码
          </button>
        </div>
      </div>
      
      <button 
        onclick="login()"
        class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all font-medium mt-6"
      >
        登录
      </button>
    </div>
    
    <div class="mt-6 p-4 bg-blue-50 rounded-lg text-sm text-blue-800">
      <p class="font-bold mb-2">💡 测试账号：</p>
      <p>正常用户：13800138002（验证码：123456）</p>
      <p>已注销用户：13800138000（登录会弹窗）</p>
    </div>
  </div>
  
  <!-- 用户主页（登录后显示） -->
  <div id="userPage" class="hidden w-full max-w-2xl p-8 bg-white rounded-2xl shadow-2xl">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">用户主页</h1>
        <p class="text-gray-500 mt-1">欢迎回来，<span id="userName" class="font-bold"></span></p>
      </div>
      <button 
        onclick="logout()"
        class="flex items-center gap-2 px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-all"
      >
        <span class="material-symbols-outlined text-sm">logout</span>
        退出登录
      </button>
    </div>
    
    <!-- 用户信息卡片 -->
    <div class="bg-gray-50 p-6 rounded-xl mb-6">
      <div class="grid grid-cols-2 gap-4 text-sm">
        <div>
          <span class="text-gray-500">用户ID：</span>
          <span id="userId" class="font-mono"></span>
        </div>
        <div>
          <span class="text-gray-500">手机号：</span>
          <span id="userPhoneDisplay"></span>
        </div>
        <div>
          <span class="text-gray-500">状态：</span>
          <span id="userStatus" class="font-bold text-green-600">正常</span>
        </div>
      </div>
    </div>
    
    <!-- 操作按钮 -->
    <div class="space-y-4">
      <button 
        onclick="testRequest()"
        class="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all font-medium flex items-center justify-center gap-2"
      >
        <span class="material-symbols-outlined">send</span>
        发起请求（测试注销拦截）
      </button>
      
      <button 
        onclick="testRequestMultiple()"
        class="w-full py-3 border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 transition-all font-medium"
      >
        连续发起 5 次请求（压力测试）
      </button>
    </div>
    
    <!-- 请求日志 -->
    <div class="mt-8">
      <h3 class="font-bold text-gray-700 mb-2">请求日志</h3>
      <div id="requestLog" class="bg-gray-900 text-green-400 p-4 rounded-lg text-sm font-mono h-48 overflow-y-auto">
        <div class="text-gray-500">等待请求...</div>
      </div>
    </div>
  </div>
  
  <!-- 弹窗：账号已注销 -->
  <div id="deactivatedModal" class="modal fixed inset-0 z-[100] items-center justify-center p-4">
    <div class="modal-mask absolute inset-0" onclick="closeCancelledModal()"></div>
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative">
      <div class="p-6 bg-red-50 border-b border-red-100">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-red-600 text-3xl">warning</span>
          </div>
          <div>
            <h3 class="text-xl font-bold text-red-800">账号已注销</h3>
            <p class="text-red-600 text-sm mt-1">您的账号已被管理员注销</p>
          </div>
        </div>
      </div>
      
      <div class="p-6">
        <p class="text-gray-700 mb-4">
          您的账号已被注销，无法继续使用系统。如有疑问，请联系管理员。
        </p>
        
        <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-600 mb-4">
          <p>📞 管理员联系方式：</p>
          <p>📧 admin@company.com</p>
          <p>📱 400-123-4567</p>
        </div>
      </div>
      
      <div class="p-6 border-t border-gray-100 flex justify-end">
        <button 
          onclick="confirmCancelled()"
          class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-all font-medium"
        >
          我知道了，返回登录页
        </button>
      </div>
    </div>
  </div>
  
  <!-- JavaScript -->
  <script>
    /* ================================================================
       配置
       ================================================================ */
    const API_BASE_URL = 'http://localhost:7511';
    
    /* ================================================================
       工具函数
       ================================================================ */
    
    /**
     * 添加日志
     */
    function addLog(message, type = 'info') {
      const logContainer = document.getElementById('requestLog');
      if (!logContainer) return;  // 如果元素不存在，直接返回
      
      const time = new Date().toLocaleTimeString();
      const colors = {
        'info': 'text-green-400',
        'error': 'text-red-400',
        'warn': 'text-yellow-400',
        'success': 'text-blue-400'
      };
      const logEntry = document.createElement('div');
      logEntry.className = colors[type] || colors['info'];
      logEntry.innerHTML = `<span class="text-gray-500">[${time}]</span> ${message}`;
      
      // 移除"等待请求..."提示
      if (logContainer.firstChild && 
          logContainer.firstChild.classList && 
          logContainer.firstChild.classList.contains('text-gray-500')) {
        logContainer.innerHTML = '';
      }
      
      logContainer.appendChild(logEntry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }
    
    /**
     * 保存用户信息到 localStorage
     */
    function saveUser(user) {
      localStorage.setItem('userId', user.id);
      localStorage.setItem('userName', user.name);
      localStorage.setItem('userPhone', user.phone);
      localStorage.setItem('userStatus', user.status);
    }
    
    /**
     * 清除用户信息
     */
    function clearUser() {
      localStorage.removeItem('userId');
      localStorage.removeItem('userName');
      localStorage.removeItem('userPhone');
      localStorage.removeItem('userStatus');
    }
    
    /**
     * 检查登录状态
     */
    function checkLogin() {
      const userId = localStorage.getItem('userId');
      if (userId) {
        showUserPage();
      } else {
        showLoginPage();
      }
    }
    
    /**
     * 显示登录页
     */
    function showLoginPage() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('userPage').classList.add('hidden');
    }
    
    /**
     * 显示用户主页
     */
    function showUserPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('userPage').classList.remove('hidden');
      
      // 填充用户信息
      document.getElementById('userName').textContent = localStorage.getItem('userName') || '未知用户';
      document.getElementById('userId').textContent = localStorage.getItem('userId') || '-';
      document.getElementById('userPhoneDisplay').textContent = localStorage.getItem('userPhone') || '-';
      
      const status = localStorage.getItem('userStatus');
      const statusEl = document.getElementById('userStatus');
      if (status === 'CANCELLED') {
        statusEl.textContent = '已注销';
        statusEl.className = 'font-bold text-red-600';
      } else {
        statusEl.textContent = '正常';
        statusEl.className = 'font-bold text-green-600';
      }
    }
    
    /* ================================================================
       登录逻辑
       ================================================================ */
    
    /**
     * 发送验证码（模拟）
     */
    function sendCode() {
      const phone = document.getElementById('loginPhone').value;
      if (!phone) {
        alert('请输入手机号');
        return;
      }
      alert('验证码已发送（模拟）\n请使用任意验证码登录');
    }
    
    /**
     * 用户登录
     */
    async function login() {
      const phone = document.getElementById('loginPhone').value;
      const code = document.getElementById('loginCode').value;
      
      if (!phone || !code) {
        alert('请填写手机号和验证码');
        return;
      }
      
      addLog('正在登录...', 'info');
      
      try {
        // 调用后端登录接口
        const response = await fetch(`${API_BASE_URL}/api/v1/portal/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            loginType: 'mobile',
            params: {
              phone: phone,
              code: code
            }
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          addLog('登录成功！', 'success');
          
          // 保存用户信息（根据实际返回格式调整）
          const user = data.data || data;
          const userId = user.id || user.userId;
          
          saveUser({
            id: userId,
            name: user.name || phone,
            phone: phone,
            status: user.status || 'ACTIVE'
          });
          
          // 关键：登录后立即检查用户状态
          addLog('正在检查账号状态...', 'info');
          const statusResponse = await fetch(`${API_BASE_URL}/api/user/profile`, {
            method: 'GET',
            headers: {
              'X-User-Id': userId
            }
          });
          
          // 如果用户已注销（403 + USER_CANCELLED），直接弹窗
          if (statusResponse.status === 403) {
            const errorData = await statusResponse.json();
            if (errorData.code === 'USER_CANCELLED') {
              addLog('⚠️ 账号已注销！', 'warn');
              handleUserCancelled();
              return;  // 不显示用户主页，直接弹窗
            }
          }
          
          showUserPage();
        } else {
          addLog('登录失败：' + (data.message || '未知错误'), 'error');
          
          // 如果是账号已注销，显示弹窗
          if (data.message && data.message.toLowerCase().includes('cancelled')) {
            addLog('⚠️ 账号已注销，无法登录！', 'warn');
            document.getElementById('deactivatedModal').classList.add('open');
          } else {
            alert('登录失败：' + (data.message || '未知错误'));
          }
        }
      } catch (error) {
        addLog('登录失败：' + error.message, 'error');
        alert('无法连接到后端服务器\n请确保后端已启动（localhost:7511）');
      }
    }
    
    /**
     * 退出登录
     */
    function logout() {
      clearUser();
      showLoginPage();
      addLog('已退出登录', 'info');
    }
    
    /* ================================================================
       测试请求（核心：捕获 403 USER_CANCELLED）
       ================================================================ */
    
    /**
     * 发起测试请求
     */
    async function testRequest() {
      const userId = localStorage.getItem('userId');
      if (!userId) {
        alert('请先登录');
        return;
      }
      
      addLog('发起请求...', 'info');
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/user/profile`, {
          method: 'GET',
          headers: {
            'X-User-Id': userId  // 后端拦截器从这里读取用户ID
          }
        });
        
        if (response.status === 403) {
          const errorData = await response.json();
          
          // 关键：检测 USER_CANCELLED
          if (errorData.code === 'USER_CANCELLED') {
            addLog('⚠️ 检测到账号已注销！', 'warn');
            handleUserCancelled();
            return;
          }
        }
        
        if (response.ok) {
          const data = await response.json();
          addLog('请求成功：' + JSON.stringify(data).substring(0, 50) + '...', 'success');
        } else {
          addLog('请求失败：' + response.status, 'error');
        }
      } catch (error) {
        addLog('请求失败：' + error.message, 'error');
      }
    }
    
    /**
     * 连续发起多次请求（压力测试）
     */
    async function testRequestMultiple() {
      addLog('开始连续请求测试（5次）...', 'info');
      
      for (let i = 1; i <= 5; i++) {
        addLog(`第 ${i} 次请求...`, 'info');
        await testRequest();
        await new Promise(resolve => setTimeout(resolve, 500)); // 间隔500ms
      }
    }
    
    /**
     * 处理用户注销（核心逻辑）
     */
    function handleUserCancelled() {
      // 1. 弹窗提示
      document.getElementById('deactivatedModal').classList.add('open');
      
      // 2. 添加日志
      addLog('🚫 账号已注销，无法继续访问', 'error');
    }
    
    /**
     * 确认注销弹窗
     */
    function confirmCancelled() {
      // 1. 清除登录状态
      clearUser();
      
      // 2. 关闭弹窗
      closeCancelledModal();
      
      // 3. 如果是登录页触发的，清空表单；否则跳转登录页
      if (!document.getElementById('loginPage').classList.contains('hidden')) {
        // 已经在登录页，清空表单
        document.getElementById('loginPhone').value = '';
        document.getElementById('loginCode').value = '';
        addLog('请使用其他账号登录', 'info');
      } else {
        // 在用户主页，跳转登录页
        showLoginPage();
        addLog('已清除登录状态，返回登录页', 'info');
      }
    }
    
    /**
     * 关闭弹窗
     */
    function closeCancelledModal() {
      document.getElementById('deactivatedModal').classList.remove('open');
    }
    
    /* ================================================================
       页面初始化
       ================================================================ */
    checkLogin();
  </script>
</body>
</html>
